# OpenOCD 設定 — IM-110T 本体基板 (STM32L452RET6, Cortex-M4) + ST-Link
# 起動: openocd -f tools/adjust-debug/openocd_l452.cfg
# GDB は localhost:3333 へ接続 (arm-none-eabi-gdb ... -ex "target remote :3333")
#
# 前提: ST-Link を本体 CN1 (SWD/JTAG, CON8) に接続。プローブは本体 CN4 経由で給電・接続。

source [find interface/stlink.cfg]
transport select hla_swd
source [find target/stm32l4x.cfg]

# リセット方式: SWD 接続で halt せず走らせたまま attach したい場合が多いので connect_assert_srst は使わない
reset_config srst_only srst_nogate

# 調整デバッグ用: 実行中に attach してブレークを張る運用 (電源 ON→測定ループ稼働中に接続)
$_TARGETNAME configure -event gdb-attach { echo "IM-110 attached (running)" }
